version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: eventboxserver:local
    ports:
      - "8080:8080"
      - "3000:3000"
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./src/main/resources/certs:/app/src/main/resources/certs
      - ./service-account-key.json:/app/service-account-key.json
      - ./src/main/resources/application-dev.properties:/app/config/application.properties
    command:
      - "java"
      - "-Duser.timezone=Asia/Ho_Chi_Minh"
      - "-jar"
      - "/app/app.jar"
      - "--spring.config.location=/app/config/application.properties"

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: EventBox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
