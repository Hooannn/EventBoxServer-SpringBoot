# Test profile for Spring Boot integration tests.
# Keep these values isolated from local and production configuration.

spring.datasource.url=jdbc:h2:mem:eventbox;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

application.rate-limit.requests-per-minute=1000
application.rate-limit.window-seconds=60

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.from-name=Localhost
spring.mail.properties.from-address=test@localhost

application.security.jwt.qrcode-secret-key=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4MTIzNDU2Nzg=
application.security.jwt.access-secret-key=test-access-secret-key
application.security.jwt.access-secret-key-path=classpath:certs/access_token_private.pem
application.security.jwt.access-public-key-path=classpath:certs/access_token_public.pem
application.security.jwt.refresh-secret-key=MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
application.security.jwt.expiration=900000
application.security.jwt.refresh.expiration=604800000
application.security.jwt.password.expiration=600000
application.security.jwt.qrcode.expiration=300000

application.security.public-apis-prefix=/public/api/v1/,/api/v1/auth/,/api/v2/auth/,/api/v1/orders/paypal/webhook/,/actuator
application.security.cors.allowed-origins=http://localhost:5173
application.security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
application.security.cors.allowed-headers=Authorization,Content-Type,X-Device-Id
application.security.cors.allow-credentials=true

application.security.cookies.http-only=true
application.security.cookies.secure=false
application.security.cookies.same-site=Lax
application.security.cookies.refresh-token-path=/api/v1/auth/refresh
application.security.cookies.access-token-path=/api

client.web.url=http://localhost:5173

paypal.client-id=test-client-id
paypal.client-secret=test-client-secret
paypal.checkout.webhook.id=test-checkout-webhook
paypal.payment.webhook.id=test-payment-webhook

exchange.api.key=test-exchange-key
amdoren.api.key=test-amdoren-key

root.user.email=test@example.com
root.user.password=test-password
root.role.name=root
root.role.description=Root role of the system
root.role.permissions=read:*,create:*,delete:*,update:*

socket-server.host=localhost
socket-server.port=0

cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-api-key
cloudinary.api-secret=test-api-secret

sentiment.service.api.base.url=http://localhost:8000

logging.level.root=WARN
eventbox.bootstrap.enabled=false
eventbox.config.access-organizer-permission=access:organizer
eventbox.config.access-admin-permission=access:admin

jobrunr.background-job-server.enabled=false
jobrunr.dashboard.enabled=false
